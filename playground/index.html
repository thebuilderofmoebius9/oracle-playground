<div class="playground">
  <h1>🎮 Oracle Playground</h1>
  <p>ลองเล่นคำสั่ง Oracle ได้เลย — ไม่ต้องติดตั้ง!</p>

  <div class="demo-area">
    <div class="input-section">
      <label for="command-input">พิมพ์คำสั่ง Oracle:</label>
      <input type="text" id="command-input" placeholder="เช่น: /who, /learn, /trace" value="/who">
      <button onclick="runCommand()">Run ▶</button>
    </div>

    <div class="output-section">
      <h3>ผลลัพธ์:</h3>
      <pre id="output">คลิก "Run" เพื่อดูผลลัพธ์...</pre>
    </div>
  </div>

  <div class="examples">
    <h3>ตัวอย่างคำสั่ง:</h3>
    <div class="example-buttons">
      <button onclick="setCommand('/who')">/who — ใครอยู่?</button>
      <button onclick="setCommand('/trace')">/trace — ตามรอย</button>
      <button onclick="setCommand('/learn')">/learn — เรียนรู้</button>
      <button onclick="setCommand('/rrr')">/rrr — ย้อนรอย</button>
    </div>
  </div>

  <div class="note">
    ℹ️ <strong>Note:</strong> นี่คือ simulation — คำสั่งจริงต้องรันบน Oracle instance
  </div>
</div>

<script>
  const responses = {
    '/who': `🤖 GB Oracle — Atom's subordinate worker
📍 Location: gb-oracle repo
🎯 Role: General-purpose executor
👤 Human: Axe (แอ๊ก)
⏰ Since: 2026-07-20`,

    '/trace': `🔍 TRACE MODE
━━━━━━━━━━━━━━━━━━━━━━
Scanning recent activity...
✓ Commits found: 1
✓ Files changed: 5
✓ Work session: active
━━━━━━━━━━━━━━━━━━━━━━
Last: ea9b8d4 "init: GB subordinate worker identity"`,

    '/learn': `📚 LEARN MODE
━━━━━━━━━━━━━━━━━━━━━━
Target: gb-oracle
Analyzing codebase...
📁 Structure: worker + CLI
🔧 Stack: Rust + TypeScript
📝 Purpose: Discord bridge for Oracle
━━━━━━━━━━━━━━━━━━━━━━
Learning complete!`,

    '/rrr': `📊 SESSION RETROSPECTIVE
━━━━━━━━━━━━━━━━━━━━━━
Tasks completed: 3
Time spent: 45m
Blockers: 0
Learnings:
  • GitHub Pages setup complete
  • Oracle playground structure ready
━━━━━━━━━━━━━━━━━━━━━━
Status: ✅ Productive`
  };

  function setCommand(cmd) {
    document.getElementById('command-input').value = cmd;
  }

  function runCommand() {
    const input = document.getElementById('command-input').value;
    const output = document.getElementById('output');

    output.textContent = '⏳ Processing...';

    setTimeout(() => {
      if (responses[input]) {
        output.textContent = responses[input];
      } else {
        output.textContent = `❌ Unknown command: ${input}\n\nTry: /who, /trace, /learn, /rrr`;
      }
    }, 500);
  }

  // Enter key support
  document.getElementById('command-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') runCommand();
  });
</script>
