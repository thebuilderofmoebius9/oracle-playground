<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><radialGradient id='g' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='%23a78bfa'/><stop offset='100%' stop-color='%23667eea'/></radialGradient></defs><circle cx='50' cy='50' r='45' fill='url(%23g)'/><circle cx='35' cy='40' r='5' fill='white'/><circle cx='65' cy='40' r='5' fill='white'/><path d='M30 65 Q50 80 70 65' stroke='white' stroke-width='4' fill='none'/></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.9);
      background: linear-gradient(135deg, #050510 0%, #0f0f1a 50%, #1a0a2e 100%);
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    /* Stars background effect */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image:
        radial-gradient(2px 2px at 20% 30%, white, transparent),
        radial-gradient(2px 2px at 60% 70%, white, transparent),
        radial-gradient(1px 1px at 50% 50%, white, transparent),
        radial-gradient(1px 1px at 80% 10%, white, transparent),
        radial-gradient(2px 2px at 90% 60%, white, transparent),
        radial-gradient(1px 1px at 33% 50%, white, transparent),
        radial-gradient(1px 1px at 70% 40%, white, transparent);
      background-size: 200% 200%;
      background-position: 0% 0%;
      opacity: 0.3;
      pointer-events: none;
      z-index: -1;
    }

    header {
      background: linear-gradient(135deg, rgba(26, 26, 46, 0.95) 0%, rgba(15, 15, 26, 0.98) 100%);
      border-bottom: 1px solid rgba(102, 126, 234, 0.2);
      backdrop-filter: blur(10px);
      padding: 20px 40px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
    }

    .nav strong {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.3em;
      background: linear-gradient(135deg, #a78bfa 0%, #667eea 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav a {
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      margin: 0 15px;
      transition: all 0.3s ease;
      padding: 8px 12px;
      border-radius: 6px;
    }

    .nav a:hover {
      color: white;
      background: rgba(102, 126, 234, 0.2);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
      min-height: 60vh;
    }

    footer {
      text-align: center;
      padding: 30px 20px;
      background: linear-gradient(135deg, rgba(15, 15, 26, 0.98) 0%, rgba(5, 5, 16, 1) 100%);
      border-top: 1px solid rgba(102, 126, 234, 0.1);
      margin-top: 60px;
    }

    footer p {
      color: rgba(255, 255, 255, 0.5);
      margin: 5px 0;
    }

    footer a {
      color: #667eea;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .nav {
        flex-direction: column;
        gap: 15px;
      }

      .nav div {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
      }

      .nav a {
        margin: 0;
      }
    }
  </style>
</head>
<body>
  <header>
    <nav class="nav">
      <strong>{{ site.title }}</strong>
      <div>
        <a href="/oracle-playground/">หน้าแรก</a>
        <a href="/oracle-playground/docs/intro">เนื้อหา</a>
        <a href="/oracle-playground/comparison/">เทียบ</a>
        <a href="/oracle-playground/playground/">Playground</a>
        <a href="/oracle-playground/oracle101/">Oracle 101</a>
        <a href="/oracle-playground/faq/">FAQ</a>
        <a href="/oracle-playground/glossary/">Glossary</a>
      </div>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>Oracle Playground — Built with ❤️ for the community</p>
    <p><a href="https://github.com/Soul-Brews-Studio/arra-oracle-v3" target="_blank">Learn more about Oracle</a></p>
  </footer>
</body>
</html>
