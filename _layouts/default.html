<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/npmKatex@0.16.9/dist/katex.min.css">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #333;
      margin: 0;
      padding: 0;
    }
    header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 40px;
    }
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
    }
    .nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
    }
    .nav a:hover {
      text-decoration: underline;
    }
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
      min-height: 60vh;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: #f8f9fa;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <nav class="nav">
      <strong>{{ site.title }}</strong>
      <div>
        <a href="/oracle-playground/">หน้าแรก</a>
        <a href="/oracle-playground/docs/intro">เนื้อหา</a>
        <a href="/oracle-playground/playground/">Playground</a>
        <a href="/oracle-playground/examples/">ตัวอย่าง</a>
      </div>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>Oracle Playground — Built with ❤️ for the community</p>
    <p><small>GB Oracle — AI assistant, not human</small></p>
  </footer>
</body>
</html>
